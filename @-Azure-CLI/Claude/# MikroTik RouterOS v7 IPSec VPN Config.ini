# ============================================
# 1. IPSec Profile Configuration (NAT-T Disabled)
# ============================================
/ip ipsec profile
add name="S2S-Profile" dh-group=modp1024 enc-algorithm=aes-256,aes-192,aes-128 hash-algorithm=sha256 lifetime=1d nat-traversal=no dpd-interval=30s dpd-maximum-failures=5

# ============================================
# 2. IPSec Peer Configuration (Local Address Added)
/ip ipsec peer
add name="S2S-Peer" address=4.221.75.190 local-address=169.1.100.233 profile="S2S-Profile" exchange-mode=ike2 send-initial-contact=yes

# ============================================
# 3. IPSec Identity (PSK Configuration)
/ip ipsec identity
add peer="S2S-Peer" auth-method=pre-shared-key secret="S2SPSK123!" generate-policy=no

# ============================================
# 4. IPSec Proposal Configuration
/ip ipsec proposal
add name="S2S-Proposal" auth-algorithms=sha256 enc-algorithms=aes-256-cbc,aes-192-cbc,aes-128-cbc lifetime=8h pfs-group=modp1024

# ============================================
# 5. IPSec Policy Configuration
/ip ipsec policy
add peer="S2S-Peer" tunnel=yes src-address=192.168.88.0/24 dst-address=10.20.1.0/24 proposal="S2S-Proposal" sa-src-address=169.1.100.233 sa-dst-address=4.221.75.190
add peer="S2S-Peer" tunnel=yes src-address=10.20.1.0/24 dst-address=192.168.88.0/24 proposal="S2S-Proposal" sa-src-address=4.221.75.190 sa-dst-address=169.1.100.233

# ============================================
# 6. Firewall Filter Rules

/ip firewall filter
add chain=input protocol=ipsec-esp action=accept comment="Accept IPSec ESP"
add chain=input protocol=ipsec-ah action=accept comment="Accept IPSec AH"
add chain=input protocol=udp dst-port=500 action=accept comment="Accept IKE"
add chain=input protocol=udp dst-port=4500 action=accept comment="Accept NAT-T"
add chain=forward src-address=10.20.1.0/24 dst-address=192.168.88.0/24 action=accept comment="Accept traffic from remote VPN network"
add chain=forward src-address=192.168.88.0/24 dst-address=10.20.1.0/24 action=accept comment="Accept traffic to remote VPN network"

# 7. Firewall Filter Rules
/ip firewall nat
add action=accept chain=srcnat dst-address-list="ZA-East-Hub" out-interface=AfriHost-OpenServe src-address=192.168.88.0/24
add action=masquerade chain=srcnat dst-address-list="" out-interface=AfriHost-OpenServe src-address=192.168.88.0/24
# ============================================
# 8. Optional: Static Routes
/ip route
add dst-address=10.20.1.0/24 gateway=4.221.75.190 distance=1 comment="Route to remote VPN network"

# ============================================
# 9. Optional: MSS Clamping
/ip firewall mangle
add chain=forward protocol=tcp tcp-flags=syn src-address=192.168.88.0/24 dst-address=10.20.1.0/24 tcp-mss=1361-65535 action=change-mss new-mss=1360 comment="Adjust MSS for VPN traffic"
add chain=forward protocol=tcp tcp-flags=syn src-address=10.20.1.0/24 dst-address=192.168.88.0/24 tcp-mss=1361-65535 action=change-mss new-mss=1360 comment="Adjust MSS for VPN return traffic"

